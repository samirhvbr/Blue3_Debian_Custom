set timeout=1
set default=0

# Carrega fonte e modo gráfico
loadfont /boot/grub/fonts/unicode.pf2
set gfxmode=1024x768
insmod all_video
insmod gfxterm
terminal_output gfxterm

# Fundo com a logo Blue3
background_image -m stretch /blue3.png

menuentry "Install Blue3 Version 2.0" {
    set root=(cd0)
    linux /install.amd/vmlinuz auto=true priority=critical file=/cdrom/preseed.cfg ---
    initrd /install.amd/initrd.gz
}

menuentry "Rescue mode" {
    set root=(cd0)
    linux /install.amd/vmlinuz rescue/enable=true
    initrd /install.amd/initrd.gz
}